<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Post | Pixel Forge Studio</title>
    <meta name="description" content="Blog post from Pixel Forge Studio by Prabhath Kelum." />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f2ed;
        --bg2: #ede9e2;
        --bg3: #e5e0d8;
        --surface: #ffffff;
        --border: #d4cfc6;
        --border-dk: #b8b0a4;
        --accent: #c84b2f;
        --text: #1a1612;
        --muted: #7c746a;
        --white: #ffffff;
        --gold: #c97d1a;
        --ink: #1a1612;
        --shadow: rgba(26,22,18,0.12);
        --shadow-lg: rgba(26,22,18,0.22);
        --nav-h: 68px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; font-size: 16px; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Outfit", sans-serif;
        line-height: 1.6;
        overflow-x: hidden;
      }
      img { display: block; max-width: 100%; }
      a { color: inherit; text-decoration: none; }
      button { font-family: inherit; cursor: pointer; }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

      body::after {
        content: "";
        position: fixed; inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        pointer-events: none; z-index: 9998; opacity: 0.45;
      }

      /* SCROLL PROGRESS */
      #scroll-progress {
        position: fixed; top: 0; left: 0; right: 0;
        height: 3px; background: transparent; z-index: 1001;
      }
      #scroll-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--gold));
        width: 0; transition: width 0.1s linear;
      }

      /* NAV */
      nav {
        position: fixed; top: 0; left: 0; right: 0;
        z-index: 1000; height: var(--nav-h);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 5%;
        background: rgba(245,242,237,0.94);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid var(--border);
        transition: box-shadow 0.3s;
      }
      nav.scrolled { box-shadow: 0 4px 28px var(--shadow); }
      .nav-logo {
        font-family: "Playfair Display", serif;
        font-size: 1.2rem; font-weight: 900;
        color: var(--ink); letter-spacing: 0.5px;
        display: flex; align-items: center; gap: 0.5rem;
      }
      .nav-logo img { height: 34px; width: auto; }
      .nav-logo span { color: var(--accent); }
      .nav-links {
        display: flex; gap: 1.75rem;
        list-style: none; align-items: center;
      }
      .nav-links a {
        color: var(--muted);
        font-family: "Space Mono", monospace;
        font-size: 0.72rem; letter-spacing: 1.5px;
        text-transform: uppercase;
        transition: color 0.25s; position: relative;
      }
      .nav-links a::after {
        content: ""; position: absolute;
        bottom: -3px; left: 0; right: 0; height: 1px;
        background: var(--accent); transform: scaleX(0);
        transform-origin: left; transition: transform 0.25s;
      }
      .nav-links a:hover { color: var(--accent); }
      .nav-links a:hover::after { transform: scaleX(1); }
      .nav-links a.active { color: var(--accent); }
      .nav-links a.active::after { transform: scaleX(1); }
      .nav-resume-btn {
        display: inline-flex; align-items: center; gap: 0.4rem;
        color: var(--ink);
        font-family: "Space Mono", monospace;
        font-size: 0.7rem; font-weight: 700;
        letter-spacing: 1.5px; text-transform: uppercase;
        border: 1.5px solid var(--ink); padding: 0.42rem 0.9rem;
        transition: all 0.25s;
      }
      .nav-resume-btn:hover { background: var(--ink); color: var(--white); }
      .hamburger {
        display: none; flex-direction: column;
        gap: 5px; cursor: pointer; padding: 6px; z-index: 10;
      }
      .hamburger span {
        display: block; width: 22px; height: 2px;
        background: var(--ink); transition: all 0.3s; transform-origin: center;
      }
      .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
      .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
      .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
      .mobile-nav {
        display: none; position: fixed;
        top: var(--nav-h); left: 0; right: 0;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 1rem 5%; z-index: 999;
        flex-direction: column; gap: 0;
        box-shadow: 0 20px 50px var(--shadow);
      }
      .mobile-nav.open { display: flex; }
      .mobile-nav a {
        color: var(--muted);
        font-family: "Space Mono", monospace;
        font-size: 0.8rem; letter-spacing: 1.5px;
        text-transform: uppercase; padding: 0.9rem 0;
        border-bottom: 1px solid var(--border); transition: color 0.2s;
      }
      .mobile-nav a:last-child { border-bottom: none; }
      .mobile-nav a:hover { color: var(--accent); }

      /* BACK BUTTON */
      .back-bar {
        margin-top: var(--nav-h);
        padding: 1rem 5%;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .back-btn {
        display: inline-flex; align-items: center; gap: 0.5rem;
        font-family: "Space Mono", monospace;
        font-size: 0.68rem; letter-spacing: 1px;
        text-transform: uppercase; color: var(--muted);
        background: none; border: none;
        cursor: pointer; transition: color 0.2s;
        padding: 0;
      }
      .back-btn:hover { color: var(--accent); }
      .back-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

      /* POST HERO */
      .post-hero {
        position: relative; width: 100%;
        height: 420px; overflow: hidden;
      }
      .post-hero-img {
        width: 100%; height: 100%;
        object-fit: cover; object-position: center;
      }
      .post-hero-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(26,22,18,0.25) 0%,
          rgba(26,22,18,0.62) 100%
        );
        display: flex; flex-direction: column;
        align-items: flex-start; justify-content: flex-end;
        padding: 3rem 5%;
      }
      .post-hero-category {
        font-family: "Space Mono", monospace;
        font-size: 0.62rem; letter-spacing: 2px;
        text-transform: uppercase; color: var(--accent);
        margin-bottom: 0.85rem;
        display: flex; align-items: center; gap: 0.6rem;
      }
      .post-hero-category::before {
        content: ""; width: 22px; height: 1px; background: var(--accent);
      }
      .post-hero-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.8rem, 4vw, 3rem);
        font-weight: 900; line-height: 1.1;
        color: var(--white); max-width: 720px;
        margin-bottom: 1.25rem;
      }
      .post-hero-meta {
        display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
        font-family: "Space Mono", monospace;
        font-size: 0.65rem; letter-spacing: 0.5px;
        color: rgba(255,255,255,0.55);
      }
      .post-hero-meta-dot {
        width: 3px; height: 3px; border-radius: 50%;
        background: rgba(255,255,255,0.3); flex-shrink: 0;
      }

      /* ARTICLE LAYOUT */
      .article-wrap {
        max-width: 760px; margin: 0 auto;
        padding: 3.5rem 5% 0;
      }

      /* ARTICLE CONTENT */
      .article-body { font-size: 1.02rem; color: var(--text); }

      .article-intro {
        font-family: "Playfair Display", serif;
        font-size: 1.2rem; font-weight: 400;
        font-style: italic; line-height: 1.8;
        color: var(--ink);
        border-left: 3px solid var(--accent);
        padding: 1.25rem 1.5rem;
        background: var(--surface);
        margin-bottom: 2.5rem;
      }

      .article-heading {
        font-family: "Playfair Display", serif;
        font-size: 1.65rem; font-weight: 900;
        color: var(--ink); margin: 2.5rem 0 1rem;
        line-height: 1.2;
        padding-bottom: 0.5rem;
        border-bottom: 1.5px solid var(--border);
      }
      .article-heading::before {
        content: ""; display: block;
        width: 28px; height: 3px;
        background: var(--accent); margin-bottom: 0.75rem;
      }

      .article-paragraph {
        line-height: 1.85; margin-bottom: 1.5rem;
        color: #2d2824;
      }

      .article-code {
        background: var(--ink);
        color: #e8e0d5;
        font-family: "Space Mono", monospace;
        font-size: 0.78rem; line-height: 1.7;
        padding: 1.5rem;
        margin: 1.75rem 0;
        overflow-x: auto;
        border-left: 3px solid var(--accent);
        white-space: pre;
      }

      .article-closing {
        background: var(--bg2);
        border: 1px solid var(--border);
        padding: 1.75rem;
        margin: 2.5rem 0;
        font-size: 1rem;
        line-height: 1.8;
        color: var(--muted);
        position: relative;
      }
      .article-closing::before {
        content: "";
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 3px; background: var(--gold);
      }

      /* TAGS */
      .article-tags {
        display: flex; flex-wrap: wrap; gap: 0.5rem;
        margin: 2.5rem 0 0;
        padding-top: 1.75rem;
        border-top: 1px solid var(--border);
      }
      .article-tag-label {
        font-family: "Space Mono", monospace;
        font-size: 0.6rem; letter-spacing: 1.5px;
        text-transform: uppercase; color: var(--muted);
        display: flex; align-items: center;
        margin-right: 0.5rem; flex-shrink: 0;
      }
      .article-tag {
        background: var(--bg3); border: 1px solid var(--border);
        padding: 0.28rem 0.75rem;
        font-family: "Space Mono", monospace;
        font-size: 0.6rem; letter-spacing: 0.8px;
        color: var(--muted); text-transform: uppercase;
        transition: all 0.2s;
      }
      .article-tag:hover {
        background: var(--accent); border-color: var(--accent);
        color: var(--white);
      }

      /* SHARE SECTION */
      .share-section {
        margin: 3rem 0 0;
        padding: 2rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-top: 3px solid var(--accent);
      }
      .share-label {
        font-family: "Space Mono", monospace;
        font-size: 0.65rem; letter-spacing: 2.5px;
        text-transform: uppercase; color: var(--muted);
        margin-bottom: 1.25rem;
        display: flex; align-items: center; gap: 0.75rem;
      }
      .share-label::before {
        content: ""; width: 22px; height: 1px; background: var(--accent);
      }
      .share-title {
        font-family: "Playfair Display", serif;
        font-size: 1.25rem; font-weight: 700;
        color: var(--ink); margin-bottom: 0.5rem;
      }
      .share-sub {
        font-size: 0.85rem; color: var(--muted);
        margin-bottom: 1.5rem; line-height: 1.6;
      }
      .share-icons {
        display: flex; gap: 0.75rem; flex-wrap: wrap;
      }
      .share-btn {
        display: inline-flex; align-items: center; gap: 0.55rem;
        border: 1.5px solid var(--border);
        background: var(--bg);
        padding: 0.6rem 1.1rem;
        font-family: "Space Mono", monospace;
        font-size: 0.63rem; letter-spacing: 1px;
        text-transform: uppercase; color: var(--muted);
        cursor: pointer; transition: all 0.25s;
      }
      .share-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
      .share-btn:hover { transform: translateY(-2px); }
      .share-btn.twitter:hover  { background: #1d9bf0; border-color: #1d9bf0; color: #fff; }
      .share-btn.linkedin:hover { background: #0a66c2; border-color: #0a66c2; color: #fff; }
      .share-btn.facebook:hover { background: #1877f2; border-color: #1877f2; color: #fff; }
      .share-btn.whatsapp:hover { background: #25d366; border-color: #25d366; color: #fff; }
      .share-btn.copy-link:hover { background: var(--ink); border-color: var(--ink); color: #fff; }
      .share-btn.copy-link.copied {
        background: #22c55e; border-color: #22c55e; color: #fff;
      }

      /* AUTHOR BOX */
      .author-box {
        display: flex; align-items: flex-start; gap: 1.25rem;
        padding: 1.75rem;
        background: var(--surface); border: 1px solid var(--border);
        margin-top: 2rem;
      }
      .author-avatar {
        width: 56px; height: 56px; flex-shrink: 0;
        background: linear-gradient(135deg, var(--accent), var(--gold));
        display: flex; align-items: center; justify-content: center;
        font-family: "Playfair Display", serif;
        font-size: 1.4rem; font-weight: 900; color: var(--white);
      }
      .author-name {
        font-family: "Playfair Display", serif;
        font-size: 1rem; font-weight: 700; color: var(--ink);
        margin-bottom: 0.25rem;
      }
      .author-role {
        font-family: "Space Mono", monospace;
        font-size: 0.62rem; letter-spacing: 1px;
        text-transform: uppercase; color: var(--accent);
        margin-bottom: 0.6rem;
      }
      .author-bio {
        font-size: 0.85rem; color: var(--muted); line-height: 1.7;
      }

      /* BACK TO BLOG BUTTON */
      .back-to-blog {
        margin: 2.5rem 0 4rem;
        display: flex; justify-content: center;
      }
      .back-to-blog-btn {
        display: inline-flex; align-items: center; gap: 0.6rem;
        background: transparent; border: 1.5px solid var(--ink);
        color: var(--ink); padding: 0.8rem 2rem;
        font-family: "Space Mono", monospace;
        font-size: 0.72rem; font-weight: 700;
        letter-spacing: 1.5px; text-transform: uppercase;
        cursor: pointer; transition: all 0.25s;
      }
      .back-to-blog-btn:hover {
        background: var(--ink); color: var(--white);
      }
      .back-to-blog-btn svg { width: 14px; height: 14px; }

      /* ERROR / LOADING */
      .post-loading {
        text-align: center; padding: 6rem 2rem;
        margin-top: var(--nav-h);
        font-family: "Space Mono", monospace;
        font-size: 0.78rem; letter-spacing: 2px;
        color: var(--muted); text-transform: uppercase;
      }
      .post-error {
        text-align: center; padding: 6rem 2rem;
        margin-top: var(--nav-h);
      }
      .post-error h2 {
        font-family: "Playfair Display", serif;
        font-size: 2rem; font-weight: 900;
        color: var(--ink); margin-bottom: 1rem;
      }
      .post-error p { color: var(--muted); margin-bottom: 2rem; }

      /* FOOTER */
      footer {
        background: var(--ink);
        border-top: 1px solid rgba(255,255,255,0.07);
        padding: 2.5rem 5%;
        display: grid; grid-template-columns: 1fr auto 1fr;
        align-items: center; gap: 1.5rem;
      }
      .footer-left { display: flex; flex-direction: column; gap: 0.4rem; }
      .footer-center { text-align: center; }
      .footer-right { display: flex; justify-content: flex-end; align-items: center; gap: 1rem; }
      .footer-contact-link {
        display: inline-flex; align-items: center; gap: 0.4rem;
        font-family: "Space Mono", monospace;
        font-size: 0.68rem; color: rgba(255,255,255,0.38);
        letter-spacing: 0.5px; transition: color 0.2s;
      }
      .footer-contact-link:hover { color: var(--white); }
      .footer-logo {
        font-family: "Playfair Display", serif;
        font-size: 1.1rem; font-weight: 900;
        color: var(--white); letter-spacing: 0.5px;
      }
      .footer-logo span { color: var(--accent); }
      .footer-copy {
        font-family: "Space Mono", monospace;
        font-size: 0.65rem; color: rgba(255,255,255,0.28);
        margin-top: 0.35rem;
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .nav-links { display: none; }
        .hamburger { display: flex; }
        nav { padding: 0 4%; }
        .post-hero { height: 280px; }
        .article-wrap { padding: 2.5rem 4% 0; }
        footer { grid-template-columns: 1fr; text-align: center; }
        .footer-right { justify-content: center; flex-wrap: wrap; }
        .footer-center { order: -1; }
        .author-box { flex-direction: column; }
      }
      @media (max-width: 480px) {
        .post-hero { height: 220px; }
        .share-icons { flex-direction: column; }
        .share-btn { justify-content: center; }
        footer { padding: 2rem 4%; }
      }
    </style>
  </head>
  <body>
    <!-- SCROLL PROGRESS -->
    <div id="scroll-progress"><div id="scroll-progress-bar"></div></div>

    <!-- NAVIGATION -->
    <nav id="main-nav">
      <a href="index.html" class="nav-logo">
        <img src="logo.png" alt="Pixel Forge Studio" onerror="this.style.display='none'" />
        PIXEL <span>FORGE</span> STUDIO
      </a>
      <ul class="nav-links">

        <li><a href="index.html#projects">Projects</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#connect">Contact</a></li>
        <li><a href="index.html">Research</a></li>
        <li><a href="blog.html" class="active">Blog</a></li>
        <li>
          <a href="./PrabhathKelumResume.pdf" download class="nav-resume-btn">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            Resume
          </a>
        </li>
      </ul>
      <div class="hamburger" id="hamburger" onclick="toggleMobileNav()">
        <span></span><span></span><span></span>
      </div>
    </nav>

    <!-- MOBILE NAV -->
    <div class="mobile-nav" id="mobile-nav">
      <a href="index.html#services" onclick="closeMobileNav()">Services</a>
      <a href="index.html#projects" onclick="closeMobileNav()">Projects</a>
      <a href="index.html#about" onclick="closeMobileNav()">About</a>
      <a href="index.html#connect" onclick="closeMobileNav()">Contact</a>
      <a href="index.html" onclick="closeMobileNav()">Research</a>
      <a href="blog.html" onclick="closeMobileNav()">Blog</a>
      <a href="./PrabhathKelumResume.pdf" download onclick="closeMobileNav()">Download Resume</a>
    </div>

    <!-- MAIN CONTENT — injected by JS -->
    <div id="post-root">
      <div class="post-loading">Loading article...</div>
    </div>

    <!-- FOOTER -->
    <footer>
      <div class="footer-left">
        <div class="footer-logo">PIXEL <span>FORGE</span> STUDIO</div>
        <div class="footer-copy">&copy; 2025 Prabhath Kelum. All rights reserved.</div>
      </div>
      <div class="footer-center">
        <div style="width:40px;height:40px;border:1.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto;">
          <svg width="18" height="18" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </div>
      </div>
      <div class="footer-right">
        <a href="mailto:prabhathkelum55@gmail.com" class="footer-contact-link">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          prabhathkelum55@gmail.com
        </a>
      </div>
    </footer>

    <script>
      /* NAV */
      window.addEventListener("scroll", () => {
        const nav = document.getElementById("main-nav");
        if (window.scrollY > 10) nav.classList.add("scrolled");
        else nav.classList.remove("scrolled");
        const total = document.body.scrollHeight - window.innerHeight;
        const pct = total > 0 ? (window.scrollY / total) * 100 : 0;
        document.getElementById("scroll-progress-bar").style.width = pct + "%";
      });

      function toggleMobileNav() {
        document.getElementById("mobile-nav").classList.toggle("open");
        document.getElementById("hamburger").classList.toggle("open");
      }
      function closeMobileNav() {
        document.getElementById("mobile-nav").classList.remove("open");
        document.getElementById("hamburger").classList.remove("open");
      }

      /* HELPERS */
      function escapeHtml(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      /* PARSE URL PARAM */
      function getPostId() {
        const params = new URLSearchParams(window.location.search);
        return parseInt(params.get("id"), 10);
      }

      /* RENDER CONTENT BLOCKS */
      function renderContent(blocks) {
        return blocks.map(block => {
          switch (block.type) {
            case "intro":
              return `<div class="article-intro">${escapeHtml(block.text)}</div>`;
            case "heading":
              return `<h2 class="article-heading">${escapeHtml(block.text)}</h2>`;
            case "paragraph":
              return `<p class="article-paragraph">${escapeHtml(block.text)}</p>`;
            case "code":
              return `<pre class="article-code">${escapeHtml(block.text)}</pre>`;
            case "closing":
              return `<div class="article-closing">${escapeHtml(block.text)}</div>`;
            default:
              return `<p class="article-paragraph">${escapeHtml(block.text || '')}</p>`;
          }
        }).join('');
      }

      /* SHARE FUNCTIONS */
      function sharePost(platform, title, url) {
        const encodedUrl   = encodeURIComponent(url);
        const encodedTitle = encodeURIComponent(title);
        let shareUrl = '';
        switch (platform) {
          case 'twitter':
            shareUrl = `https://twitter.com/intent/tweet?text=${encodedTitle}&url=${encodedUrl}`;
            break;
          case 'linkedin':
            shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`;
            break;
          case 'facebook':
            shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`;
            break;
          case 'whatsapp':
            shareUrl = `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`;
            break;
        }
        if (shareUrl) window.open(shareUrl, '_blank', 'noopener,noreferrer,width=600,height=500');
      }

      function copyLink() {
        const btn = document.querySelector('.share-btn.copy-link');
        navigator.clipboard.writeText(window.location.href).then(() => {
          btn.classList.add('copied');
          btn.querySelector('.copy-text').textContent = 'Copied!';
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.querySelector('.copy-text').textContent = 'Copy Link';
          }, 2200);
        }).catch(() => {
          const tmp = document.createElement('textarea');
          tmp.value = window.location.href;
          document.body.appendChild(tmp);
          tmp.select();
          document.execCommand('copy');
          document.body.removeChild(tmp);
          btn.classList.add('copied');
          btn.querySelector('.copy-text').textContent = 'Copied!';
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.querySelector('.copy-text').textContent = 'Copy Link';
          }, 2200);
        });
      }

      /* RENDER FULL POST */
      function renderPost(post) {
        const url   = window.location.href;
        const title = post.title;

        document.title = `${post.title} | Pixel Forge Studio`;

        const root = document.getElementById("post-root");
        root.innerHTML = `
          <!-- BACK BAR -->
          <div class="back-bar">
            <button class="back-btn" onclick="history.back()">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
              </svg>
              Back to Blog
            </button>
          </div>

          <!-- HERO -->
          <div class="post-hero">
            <img
              class="post-hero-img"
              src="${escapeHtml(post.coverImage || 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=1400&q=85')}"
              alt="${escapeHtml(post.title)}"
              onerror="this.src='https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=1400&q=85'"
            />
            <div class="post-hero-overlay">
              <div class="post-hero-category">${escapeHtml(post.category || 'Article')}</div>
              <h1 class="post-hero-title">${escapeHtml(post.title)}</h1>
              <div class="post-hero-meta">
                <span>${escapeHtml(post.author || '')}</span>
                <span class="post-hero-meta-dot"></span>
                <span>${escapeHtml(post.date || '')}</span>
                <span class="post-hero-meta-dot"></span>
                <span>${escapeHtml(post.readTime || '')}</span>
              </div>
            </div>
          </div>

          <!-- ARTICLE BODY -->
          <div class="article-wrap">
            <div class="article-body">
              ${renderContent(post.content || [])}
            </div>

            <!-- TAGS -->
            ${post.tags && post.tags.length ? `
              <div class="article-tags">
                <span class="article-tag-label">Tags</span>
                ${post.tags.map(t => `<span class="article-tag">${escapeHtml(t)}</span>`).join('')}
              </div>
            ` : ''}

            <!-- SHARE SECTION -->
            <div class="share-section">
              <div class="share-label">Share This Article</div>
              <div class="share-title">Found this useful?</div>
              <p class="share-sub">If this article helped you, share it with your network. It means a great deal.</p>
              <div class="share-icons">
                <button class="share-btn twitter" onclick="sharePost('twitter', '${escapeHtml(title).replace(/'/g, "\\'")}', '${escapeHtml(url).replace(/'/g, "\\'")}')">
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.258 5.63 5.906-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                  </svg>
                  X / Twitter
                </button>
                <button class="share-btn linkedin" onclick="sharePost('linkedin', '${escapeHtml(title).replace(/'/g, "\\'")}', '${escapeHtml(url).replace(/'/g, "\\'")}')">
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/>
                    <circle cx="4" cy="4" r="2"/>
                  </svg>
                  LinkedIn
                </button>
                <button class="share-btn facebook" onclick="sharePost('facebook', '${escapeHtml(title).replace(/'/g, "\\'")}', '${escapeHtml(url).replace(/'/g, "\\'")}')">
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
                  </svg>
                  Facebook
                </button>
                <button class="share-btn whatsapp" onclick="sharePost('whatsapp', '${escapeHtml(title).replace(/'/g, "\\'")}', '${escapeHtml(url).replace(/'/g, "\\'")}')">
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
                  </svg>
                  WhatsApp
                </button>
                <button class="share-btn copy-link" onclick="copyLink()">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                  </svg>
                  <span class="copy-text">Copy Link</span>
                </button>
              </div>
            </div>

            <!-- AUTHOR BOX -->
            <div class="author-box">
              <div class="author-avatar">P</div>
              <div>
                <div class="author-name">${escapeHtml(post.author || 'Prabhath Kelum')}</div>
                <div class="author-role">CEO &amp; Lead Developer — Pixel Forge Studio</div>
                <div class="author-bio">
                  Full-stack developer and studio founder with 5+ years of experience building
                  web applications, desktop software, and digital products. Specialising in
                  Vue.js, FastAPI, PostgreSQL, and clean interface design.
                </div>
              </div>
            </div>

            <!-- BACK TO BLOG -->
            <div class="back-to-blog">
              <button class="back-to-blog-btn" onclick="window.location.href='blog.html'">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <line x1="19" y1="12" x2="5" y2="12"/>
                  <polyline points="12 19 5 12 12 5"/>
                </svg>
                All Articles
              </button>
            </div>
          </div>
        `;
      }

      /* LOAD AND FIND POST */
      async function loadPost() {
        const id   = getPostId();
        const root = document.getElementById("post-root");

        if (!id) {
          root.innerHTML = `
            <div class="post-error">
              <h2>Post Not Found</h2>
              <p>No post ID was provided in the URL.</p>
              <button class="back-to-blog-btn" onclick="window.location.href='blog.html'" style="margin:0 auto;display:flex;">
                Back to Blog
              </button>
            </div>`;
          return;
        }

        try {
          const res = await fetch("./blogs.json?v=" + Date.now());
          if (!res.ok) throw new Error("fetch failed");
          const posts = await res.json();
          const post  = posts.find(p => p.id === id);

          if (!post) {
            root.innerHTML = `
              <div class="post-error">
                <h2>Article Not Found</h2>
                <p>The article you are looking for does not exist or may have been removed.</p>
                <button class="back-to-blog-btn" onclick="window.location.href='blog.html'" style="margin:0 auto;display:flex;">
                  Back to Blog
                </button>
              </div>`;
            return;
          }

          renderPost(post);
        } catch (e) {
          root.innerHTML = `
            <div class="post-error">
              <h2>Could Not Load Article</h2>
              <p>There was a problem loading the post. Please try again later.</p>
              <button class="back-to-blog-btn" onclick="window.location.href='blog.html'" style="margin:0 auto;display:flex;">
                Back to Blog
              </button>
            </div>`;
        }
      }

      window.addEventListener("load", loadPost);
    </script>
  </body>
